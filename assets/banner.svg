<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29">
        <animate attributeName="stop-color" values="#0f0c29;#24243e;#0f0c29" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#302b63">
        <animate attributeName="stop-color" values="#302b63;#1b1a55;#302b63" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#24243e">
        <animate attributeName="stop-color" values="#24243e;#0f0c29;#24243e" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="50%" stop-color="#7b61ff"/>
      <stop offset="100%" stop-color="#00f5ff"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0; 1 0; -1 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="particleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bgGrad)"/>

  <!-- Floating particles -->
  <g>
    <circle cx="120" cy="260" r="3" fill="url(#particleGlow)">
      <animate attributeName="cy" values="260;40;260" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="300" r="4" fill="url(#particleGlow)">
      <animate attributeName="cy" values="300;20;300" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="280" r="2.5" fill="url(#particleGlow)">
      <animate attributeName="cy" values="280;30;280" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="640" cy="290" r="3.5" fill="url(#particleGlow)">
      <animate attributeName="cy" values="290;25;290" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="270" r="3" fill="url(#particleGlow)">
      <animate attributeName="cy" values="270;35;270" dur="8.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="8.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="960" cy="300" r="4" fill="url(#particleGlow)">
      <animate attributeName="cy" values="300;20;300" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="280" r="2.5" fill="url(#particleGlow)">
      <animate attributeName="cy" values="280;30;280" dur="9.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="9.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="60" r="2" fill="url(#particleGlow)">
      <animate attributeName="cx" values="60;1140;60" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Orbiting ring accent -->
  <g transform="translate(1050,80)">
    <circle r="34" fill="none" stroke="#00f5ff" stroke-width="1" opacity="0.35"/>
    <circle r="48" fill="none" stroke="#7b61ff" stroke-width="1" opacity="0.25"/>
    <circle r="4" fill="#00f5ff">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
      <animateMotion path="M 34 0 A 34 34 0 1 1 -34 0 A 34 34 0 1 1 34 0" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Main title -->
  <text x="80" y="150" font-family="Segoe UI, Verdana, sans-serif" font-size="54" font-weight="700" fill="url(#textGrad)" filter="url(#glow)">
    ZEESHAN HAIDER
  </text>

  <!-- Subtitle -->
  <text x="82" y="195" font-family="Segoe UI, Verdana, sans-serif" font-size="22" fill="#c9d1ff" opacity="0.9">
    Software Developer &#8226; AI &amp; Data Science &#8226; Building with Code and Data
  </text>

  <!-- Typing cursor accent line -->
  <rect x="82" y="215" width="3" height="26" fill="#00f5ff">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
  <text x="98" y="235" font-family="Consolas, monospace" font-size="17" fill="#7fffd4" opacity="0.85">
    while(learning) { build(); ship(); grow(); }
  </text>
</svg>
