<svg width="1200" height="130" viewBox="0 0 1200 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29">
        <animate attributeName="stop-color" values="#0f0c29;#24243e;#0f0c29" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#302b63">
        <animate attributeName="stop-color" values="#302b63;#1b1a55;#302b63" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#24243e">
        <animate attributeName="stop-color" values="#24243e;#0f0c29;#24243e" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="textGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="50%" stop-color="#7b61ff"/>
      <stop offset="100%" stop-color="#00f5ff"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0; 1 0; -1 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="pGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="130" rx="14" fill="url(#bgGrad3)"/>

  <g>
    <circle cx="140" cy="110" r="2.5" fill="url(#pGlow3)">
      <animate attributeName="cy" values="110;15;110" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="100" r="3" fill="url(#pGlow3)">
      <animate attributeName="cy" values="100;20;100" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1120" cy="30" r="2" fill="url(#pGlow3)">
      <animate attributeName="cy" values="30;100;30" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="11s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(1130,65)">
    <circle r="26" fill="none" stroke="#00f5ff" stroke-width="1" opacity="0.3"/>
    <circle r="3.5" fill="#00f5ff">
      <animateMotion path="M 26 0 A 26 26 0 1 1 -26 0 A 26 26 0 1 1 26 0" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="55" y="80" font-family="Segoe UI, Verdana, sans-serif" font-size="40" font-weight="700" fill="url(#textGrad3)" filter="url(#glow3)">
    💼 EXPERIENCE
  </text>
</svg>
